<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EngLog & Praise</title>
    <link rel="stylesheet" href="common.css">
    <style>
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="date"], input[type="number"], textarea {
            width: 100%; padding: 10px; box-sizing: border-box;
            border: 1px solid var(--border-color); border-radius: 5px;
        }
        textarea { resize: vertical; height: 100px; }
        button.submit-btn {
            background-color: var(--accent-color); color: white;
            border: none; padding: 15px; width: 100%;
            font-size: 1.1rem; border-radius: 5px; cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        button.submit-btn:disabled { background-color: #cccccc; cursor: not-allowed; }
        
        #result-area {
            margin-top: 30px; padding: 20px; background-color: #E8F4F8;
            border-radius: 10px; display: none; line-height: 1.6;
            border-left: 5px solid var(--primary-color);
        }
        
        .loader-container { display: none; text-align: center; margin-top: 20px; }
        .spinner {
            border: 4px solid rgba(0,0,0,0.1); width: 36px; height: 36px;
            border-radius: 50%; border-left-color: var(--primary-color);
            animation: spin 1s linear infinite; display: inline-block; margin-bottom: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <main>
        <h2>今日のエンタメ記録</h2>
        <form id="log-form">
            <div class="form-group">
                <label for="movieTitle">作品名</label>
                <input type="text" id="movieTitle" required placeholder="例：美女と野獣">
            </div>
            <div class="form-group">
                <label for="watchDate">視聴日</label>
                <input type="date" id="watchDate" required>
            </div>
            <div class="form-group">
                <label for="watchTime">時間（分）※管理ではなく記録用です</label>
                <input type="number" id="watchTime" required placeholder="例：120">
            </div>
            <div class="form-group">
                <label for="impression">楽しかったこと・聞き取れたセリフ等</label>
                <textarea id="impression" required placeholder="初めて without you が聞き取れた！ビジネスの会議シーンが面白かった。"></textarea>
            </div>
            <button type="submit" class="submit-btn" id="submit-btn">記録してAIコーチに送る！</button>
        </form>

        <div id="loader" class="loader-container">
            <div class="spinner"></div>
            <p style="color: var(--primary-color); font-weight: bold;">AIコーチが全力で賞賛の準備をしています...<br><span style="font-size: 0.8rem; color: #888;">(裏側でTOEIC/ビジネスデータの抽出中)</span></p>
        </div>

        <div id="result-area"></div>
    </main>

    <script src="common.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
