<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EngLog & Praise - チャット</title>
    <link rel="stylesheet" href="common.css">
</head>
<body style="overflow: hidden;"> <!-- チャットUIのためbodyスクロールをロック -->
    
    <div class="chat-wrapper">
        <!-- タイムラインエリア -->
        <div class="chat-timeline" id="chat-timeline">
            <!-- 初期のAIメッセージ -->
            <div class="chat-message ai">
                <div class="message-content">
                    こんにちは！今日の英語学習エンタメ記録を教えてください！どんな小さなことでも全力で褒めちぎります✨
                </div>
                <div class="message-time">System</div>
            </div>
            
            <!-- ローディングアニメーション (非表示) -->
            <div class="typing-indicator" id="typing-indicator">
                <span></span><span></span><span></span>
            </div>
        </div>

        <!-- フォーム開閉トグルボタン -->
        <div class="form-toggle-bar" id="form-toggle-btn">
            ▼ 入力フォームを閉じる
        </div>

        <!-- 入力フォームエリア -->
        <div class="chat-input-area" id="chat-input-area">
            <form id="log-form">
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 2;">
                        <label for="movieTitle">作品名</label>
                        <input type="text" id="movieTitle" required placeholder="例：美女と野獣">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="watchTime">時間(分)</label>
                        <input type="number" id="watchTime" required placeholder="120">
                    </div>
                </div>
                <div class="form-group">
                    <label for="watchDate" style="display: none;">視聴日</label>
                    <input type="date" id="watchDate" required style="display: none;"> <!-- 裏で今日の日付を保持 -->
                </div>
                <div class="form-group">
                    <label for="impression">楽しかったこと・気づき</label>
                    <textarea id="impression" required placeholder="初めてセリフが聞き取れた！ビジネスの会議シーンが面白かった。"></textarea>
                </div>
                <button type="submit" class="submit-btn" id="submit-btn">記録してAIコーチに送る</button>
            </form>
        </div>
    </div>

    <script src="common.js"></script>
    <script src="app.js"></script>
</body>
</html>
