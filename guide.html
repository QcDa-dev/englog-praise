<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>使い方ガイド - EngLog & Praise</title>
    <link rel="stylesheet" href="common.css">
</head>
<body>
    <main class="general-main">
        <h2>使い方ガイド</h2>
        <p>「EngLog & Praise」は、あなたの英語学習を全力で肯定する記録アプリです。</p>
        <ol style="line-height: 1.8;">
            <li>チャット画面の下部フォームに、視聴した映画のタイトル、時間、感想を入力します。</li>
            <li>「記録してAIコーチに送る」ボタンを押します。</li>
            <li>LINEのようなチャット形式で、あなたの専属コーチが全力で褒めちぎるメッセージを返してくれます！</li>
            <li>入力した記録とコーチのメッセージは自動的に保存され、ハンバーガーメニューの「これまでの記録」からいつでも振り返ることができます。</li>
        </ol>
        <p>時間は気にせず、まずは「楽しむこと」をどんどんチャットに投げていきましょう！</p>
    </main>
    <script src="common.js"></script>
</body>
</html>
