<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>使い方ガイド - EngLog & Praise</title>
    <link rel="stylesheet" href="common.css">
</head>
<body>
    <main>
        <h2>使い方ガイド</h2>
        <p>「EngLog & Praise」は、あなたの英語学習を全力で肯定する記録アプリです。</p>
        <ol style="line-height: 1.8;">
            <li>トップページから、視聴した映画のタイトル、日付、時間、感想を入力します。</li>
            <li>「記録してAIコーチに送る！」ボタンを押します。</li>
            <li>あなたの専属コーチが、あなたの変化や気づきを全力で褒めちぎります！</li>
            <li>裏側では、別のAIがあなたの感想を分析し、「TOEIC向け」「ビジネス向け」のフレーズを自動で抽出し、データベースに保存します。</li>
        </ol>
        <p>スプレッドシート連携用のGASコードを実行することで、蓄積されたデータを一覧化できます。</p>
    </main>
    <script src="common.js"></script>
</body>
</html>
